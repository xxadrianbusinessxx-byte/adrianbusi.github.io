<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ORBIT·IDE | Ranking Estelar</title>
  <!-- Tabler Icons + Font Awesome -->
  <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@2.30.0/tabler-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #030812;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Exo 2', sans-serif;
      padding: 24px 16px;
    }

    /* App Shell Espacial */
    .app-shell {
      background: #050d1a;
      border-radius: 40px;
      overflow: hidden;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      border: 1px solid rgba(100,180,255,0.25);
      position: relative;
      box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(77,184,255,0.15);
    }

    /* Estrellas animadas */
    .stars {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 40px;
      z-index: 0;
    }
    .star {
      position: absolute; background: #fff; border-radius: 50%; opacity: 0;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--dl, 0s);
    }
    @keyframes twinkle {
      0%,100%{ opacity: 0; }
      50%{ opacity: var(--op, 0.7); }
    }
    @keyframes scanLine {
      0%{ top: 0; }
      100%{ top: 100%; }
    }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.25), transparent);
      animation: scanLine 7s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    .ranking-container {
      position: relative;
      z-index: 5;
      padding: 20px 28px 32px;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-mark {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6bb5ff, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }
    .badge-ranking {
      background: rgba(77,184,255,0.12);
      border-radius: 60px;
      padding: 6px 16px;
      border-left: 2px solid #ffd966;
      font-size: 11px;
      font-family: 'Orbitron', monospace;
      color: #ffdd88;
    }

    /* Sección de 3 primeros (Podio Estelar) */
    .podium-section {
      margin-bottom: 32px;
    }
    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: #8bbdff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .podium-cards {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .podium-card {
      background: linear-gradient(145deg, rgba(15,35,70,0.7), rgba(8,18,45,0.8));
      backdrop-filter: blur(12px);
      border-radius: 28px;
      text-align: center;
      padding: 20px 16px;
      width: 140px;
      border: 1px solid rgba(255,215,0,0.3);
      transition: transform 0.2s;
      position: relative;
    }
    .podium-card.first {
      transform: scale(1.02);
      background: linear-gradient(145deg, rgba(255,200,50,0.15), rgba(255,180,0,0.08));
      border: 1px solid rgba(255,215,0,0.6);
      box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }
    .podium-rank {
      font-family: 'Orbitron', monospace;
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd966, #ffaa33);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .podium-avatar {
      width: 70px;
      height: 70px;
      background: radial-gradient(circle at 30% 30%, #4a6fa5, #1b2f4a);
      border-radius: 50%;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      border: 2px solid gold;
    }
    .podium-name {
      font-weight: 600;
      font-size: 15px;
      color: #e8f0ff;
      margin: 10px 0 4px;
    }
    .podium-xp {
      font-size: 11px;
      font-family: 'Orbitron', monospace;
      color: #ffcd7e;
    }
    .star-decoration {
      position: absolute;
      top: -10px;
      right: -8px;
      font-size: 22px;
      opacity: 0.8;
    }

    /* Tarjeta del usuario actual */
    .user-rank-card {
      background: rgba(30,60,120,0.4);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 16px 24px;
      margin: 24px 0;
      border: 1px solid rgba(100,180,255,0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .user-rank-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .user-badge {
      background: #2a4c7a;
      border-radius: 40px;
      padding: 6px 16px;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .user-name-large {
      font-size: 18px;
      font-weight: 600;
    }
    .user-xp {
      color: #ffcd7e;
    }
    .next-rank {
      font-size: 12px;
      color: #88bbff;
    }

    /* Tabla de Ranking (Top 20) */
    .ranking-table-wrapper {
      background: rgba(5, 15, 30, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      overflow-x: auto;
      border: 0.5px solid rgba(100,180,255,0.2);
      margin-top: 8px;
    }
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 500px;
    }
    .ranking-table th {
      text-align: left;
      padding: 16px 16px;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: #9bc0ff;
      border-bottom: 1px solid rgba(100,180,255,0.2);
    }
    .ranking-table td {
      padding: 12px 16px;
      color: #d4ecff;
      border-bottom: 0.5px solid rgba(100,180,255,0.1);
    }
    .ranking-table tr:hover {
      background: rgba(77,184,255,0.08);
    }
    .rank-medal {
      font-weight: bold;
      font-family: monospace;
    }
    .top-rank {
      color: #ffd966;
    }
    .user-row {
      background: rgba(77,184,255,0.12);
      border-left: 3px solid #4db8ff;
      font-weight: 500;
    }
    .avatar-mini {
      width: 28px;
      height: 28px;
      background: #1f4068;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      font-size: 14px;
    }
    /* Navegación inferior */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 32px;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: rgba(30,60,110,0.6);
      border: 1px solid rgba(77,184,255,0.4);
      border-radius: 60px;
      padding: 12px 28px;
      font-family: 'Orbitron', monospace;
      font-weight: 500;
      font-size: 13px;
      color: #cce8ff;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(4px);
    }
    .nav-btn:hover {
      background: #2a5385;
      border-color: #6db5ff;
      transform: translateY(-2px);
    }

    @media (max-width: 700px) {
      .ranking-container { padding: 16px; }
      .podium-card { width: 110px; padding: 12px; }
      .podium-avatar { width: 50px; height: 50px; font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="stars" id="stars"></div>
  <div class="scan-line"></div>

  <div class="ranking-container">
    <div class="top-bar">
      <div class="logo-area">
        <span class="logo-mark">ORBIT·IDE</span>
        <div class="badge-ranking"><i class="ti ti-chart-line"></i> RANKING ESTELAR</div>
      </div>
      <div style="font-size: 11px; color:#88aaff;"><i class="ti ti-stars"></i> Clasificación Astronautas</div>
    </div>

    <!-- SECCIÓN PODIO: TOP 3 -->
    <div class="podium-section">
      <div class="section-title"><i class="ti ti-crown"></i> PODIO DE HÉROES CÓSMICOS</div>
      <div class="podium-cards" id="podiumContainer"></div>
    </div>

    <!-- TARJETA DEL USUARIO ACTUAL (puesto, XP, etc) -->
    <div class="user-rank-card" id="userRankCard">
      <!-- dinámico con js -->
    </div>

    <!-- TABLA DE LOS PRIMEROS 20 -->
    <div class="section-title" style="margin-top: 12px;"><i class="ti ti-list-numbers"></i> TABLA GALÁCTICA · TOP 20</div>
    <div class="ranking-table-wrapper">
      <table class="ranking-table" id="rankingTable">
        <thead>
          <tr><th>POSICIÓN</th><th>ASTRONAUTA</th><th>NIVEL</th><th>XP TOTAL</th><th>RACHA</th></tr>
        </thead>
        <tbody id="rankingTableBody"></tbody>
      </table>
    </div>

    <!-- BOTONES DE NAVEGACIÓN -->
    <div class="nav-buttons">
      <div class="nav-btn" id="goToMainBtn"><i class="ti ti-home"></i> PRINCIPAL</div>
      <div class="nav-btn" id="goToEditorBtn"><i class="ti ti-code"></i> EDITOR</div>
      <div class="nav-btn" id="goToMissionsBtn"><i class="ti ti-flag"></i> MISIONES</div>
      <div class="nav-btn" id="goToProfileBtn"><i class="ti ti-user"></i> PERFIL</div>
    </div>
  </div>
</div>

<script>
  // GENERAR ESTRELLAS DE FONDO
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.4 + 0.5;
    star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;--d:${2 + Math.random() * 5}s;--dl:-${Math.random() * 5}s;--op:${0.3 + Math.random() * 0.7}`;
    starsContainer.appendChild(star);
  }

  // DATOS DE RANKING (MOCK con nombres espaciales + XP)
  // Generar top 20 rankings realistas + el usuario actual
  const rankNames = [
    "Nova Stellaris", "CosmicPulse", "Orion Hunter", "Lunar Drifter", "Solar Flare", "Nebula Knight", "Asteroid Rider", 
    "Galactic Sage", "Zenith Warden", "Stardust Voyager", "Plasma Surfer", "Void Ranger", "Eclipse Phantom", 
    "Quasar Seeker", "Andromeda Chief", "Celestial Nomad", "Meteor Walker", "Helix Pilot", "Nova Empress", "Dark Matter"
  ];
  
  // Generar 20 pilotos con XP aleatorias entre 300 y 3850
  let rankingList = [];
  for (let i = 0; i < 20; i++) {
    let xp = Math.floor(Math.random() * (3800 - 400 + 1) + 400);
    let level = Math.floor(xp / 350) + 1;
    let streak = Math.floor(Math.random() * 20) + 1;
    rankingList.push({
      id: i+1,
      name: rankNames[i % rankNames.length] + (i < 3 ? "" : ""),
      xp: xp,
      level: level,
      streak: streak,
      avatarIcon: i===0 ? "👑" : (i===1 ? "🌟" : (i===2 ? "🚀" : "🧑‍🚀"))
    });
  }
  // Ordenar por XP descendente (ya casi lo están pero ajustamos)
  rankingList.sort((a,b) => b.xp - a.xp);
  
  // Usuario actual: datos desde localStorage o predefinidos (Cosmic Explorer)
  let currentUser = {
    name: "Cosmic Explorer",
    xp: 1240,
    level: 4,
    streak: 7,
    rank: 0  // se calculará
  };
  
  // Cargar desde localStorage si existe perfil con XP
  const savedXP = localStorage.getItem('userXP');
  const savedName = localStorage.getItem('userName');
  if (savedXP) currentUser.xp = parseInt(savedXP);
  if (savedName) currentUser.name = savedName;
  // También ajustamos nivel en base a XP
  currentUser.level = Math.max(1, Math.floor(currentUser.xp / 330) + 1);
  
  // Insertar usuario actual en la lista combinada para calcular su posición real
  let allRankings = [...rankingList];
  allRankings.push({
    id: 99,
    name: currentUser.name,
    xp: currentUser.xp,
    level: currentUser.level,
    streak: currentUser.streak,
    isCurrentUser: true
  });
  allRankings.sort((a,b) => b.xp - a.xp);
  // encontrar posición del usuario actual
  const userPos = allRankings.findIndex(u => u.isCurrentUser === true) + 1;
  currentUser.rank = userPos;
  
  // Mostrar Podio (Top 3)
  const podiumContainer = document.getElementById('podiumContainer');
  function renderPodium() {
    const top3 = rankingList.slice(0,3);
    const medals = ['🥇', '🥈', '🥉'];
    const colors = ['#FFD700', '#C0C0C0', '#CD7F32'];
    podiumContainer.innerHTML = '';
    top3.forEach((user, idx) => {
      const card = document.createElement('div');
      card.className = `podium-card ${idx === 0 ? 'first' : ''}`;
      card.innerHTML = `
        <div class="podium-rank">#${idx+1}</div>
        <div class="star-decoration">${medals[idx]}</div>
        <div class="podium-avatar" style="border-color:${colors[idx]}">${idx===0 ? '🏆' : (idx===1 ? '⭐' : '🌙')}</div>
        <div class="podium-name">${user.name}</div>
        <div class="podium-xp">${user.xp.toLocaleString()} XP</div>
        <div style="font-size:10px; margin-top:6px;">Nivel ${user.level}</div>
      `;
      podiumContainer.appendChild(card);
    });
  }
  
  // Render tabla de top 20 completa
  function renderRankingTable() {
    const tbody = document.getElementById('rankingTableBody');
    tbody.innerHTML = '';
    // Mostramos los primeros 20 de rankingList (sin el usuario extra)
    const top20 = rankingList.slice(0,20);
    top20.forEach((user, index) => {
      const row = tbody.insertRow();
      const rankCell = row.insertCell(0);
      const nameCell = row.insertCell(1);
      const levelCell = row.insertCell(2);
      const xpCell = row.insertCell(3);
      const streakCell = row.insertCell(4);
      
      const rankNumber = index+1;
      rankCell.innerHTML = `<span class="rank-medal ${rankNumber <=3 ? 'top-rank' : ''}">${rankNumber <=3 ? (rankNumber === 1 ? '🥇 ' : (rankNumber === 2 ? '🥈 ' : '🥉 ')) : ''}${rankNumber}</span>`;
      nameCell.innerHTML = `<div style="display:flex; align-items:center;"><span class="avatar-mini">${user.avatarIcon || '🧑‍🚀'}</span> ${user.name}</div>`;
      levelCell.innerHTML = `NIVEL ${user.level}`;
      xpCell.innerHTML = `${user.xp.toLocaleString()} XP`;
      streakCell.innerHTML = `🔥 ${user.streak} días`;
    });
  }
  
  // Render tarjeta de usuario actual con su posición, XP y medalla
  function renderUserCard() {
    const container = document.getElementById('userRankCard');
    // Determinar medalla según puesto
    let medalIcon = '';
    if (currentUser.rank === 1) medalIcon = '🏆👑';
    else if (currentUser.rank === 2) medalIcon = '🥈✨';
    else if (currentUser.rank === 3) medalIcon = '🥉🌠';
    else medalIcon = '🪐';
    
    // Calcular XP para próximo nivel
    const xpNeeded = (currentUser.level * 330) - currentUser.xp;
    const nextLevelXP = xpNeeded > 0 ? xpNeeded : 0;
    const percentToNext = Math.min(100, Math.floor((currentUser.xp % 330) / 330 * 100));
    
    container.innerHTML = `
      <div class="user-rank-info">
        <div class="user-badge">${medalIcon} PUESTO #${currentUser.rank}</div>
        <div><i class="ti ti-user-circle" style="font-size:24px;"></i> <span class="user-name-large">${currentUser.name}</span></div>
        <div class="user-xp"><i class="ti ti-chart-infographic"></i> ${currentUser.xp} XP total</div>
        <div>🔥 Racha: ${currentUser.streak} días</div>
      </div>
      <div class="next-rank">
        <i class="ti ti-arrow-up"></i> Siguiente nivel: +${nextLevelXP} XP (${percentToNext}% completado)
      </div>
    `;
  }
  
  // Llamar funciones iniciales
  renderPodium();
  renderRankingTable();
  renderUserCard();
  
  // Función para sincronizar si se completa alguna misión desde otras vistas (actualizar XP en localStorage)
  // Leemos si hay actualización desde "misión completada" y refrescamos ranking
  function syncUserProgress() {
    const storedXP = localStorage.getItem('userXP');
    if (storedXP && parseInt(storedXP) !== currentUser.xp) {
      currentUser.xp = parseInt(storedXP);
      currentUser.level = Math.max(1, Math.floor(currentUser.xp / 330) + 1);
      // Recalcular rango dentro del ranking
      let tempRankings = [...rankingList];
      tempRankings.push({
        name: currentUser.name,
        xp: currentUser.xp,
        level: currentUser.level,
        streak: currentUser.streak,
        isCurrentUser: true
      });
      tempRankings.sort((a,b) => b.xp - a.xp);
      const newPos = tempRankings.findIndex(u => u.isCurrentUser === true) + 1;
      currentUser.rank = newPos;
      renderUserCard();
      // Si queremos actualizar la tabla en caso de que el usuario aparezca dentro del top20?
      // Reordenamos rankingList modificando alguna posición? solo para reflejar, mejor mantener estática la tabla de ejemplo,
      // pero también podemos re-ordenar los datos mockeando al usuario dentro de los primeros 20 si su xp es alta.
      // Para experiencia dinámica, si el usuario supera a algún competidor, actualizamos rankingList.
      // Esto demuestra integración.
      let userInTop = rankingList.findIndex(u => u.name === currentUser.name);
      if (userInTop !== -1) {
        rankingList[userInTop].xp = currentUser.xp;
        rankingList[userInTop].level = currentUser.level;
        rankingList.sort((a,b) => b.xp - a.xp);
      } else if (currentUser.xp > (rankingList[rankingList.length-1]?.xp || 0)) {
        // Insertar al usuario en ranking y eliminar el último
        rankingList.push({
          id: 999,
          name: currentUser.name,
          xp: currentUser.xp,
          level: currentUser.level,
          streak: currentUser.streak,
          avatarIcon: "🧑‍🚀"
        });
        rankingList.sort((a,b) => b.xp - a.xp);
        rankingList = rankingList.slice(0,20);
      }
      renderRankingTable();
      renderPodium(); // podio también podría cambiar si el usuario alcanza top3
      renderUserCard();
    }
  }
  // Sincronización al cargar y cada vez que se recibe un evento de storage (por si otra pestaña actualiza)
  window.addEventListener('storage', (e) => {
    if (e.key === 'userXP' || e.key === 'userName') {
      syncUserProgress();
    }
  });
  syncUserProgress();
  
  // BOTONES DE NAVEGACIÓN (redirección a los archivos correspondientes)
  document.getElementById('goToMainBtn').addEventListener('click', () => {
    window.location.href = 'home.html';
  });
  document.getElementById('goToEditorBtn').addEventListener('click', () => {
    window.location.href = 'editor.html';
  });
  document.getElementById('goToMissionsBtn').addEventListener('click', () => {
    window.location.href = 'mision.html';
  });
  document.getElementById('goToProfileBtn').addEventListener('click', () => {
    window.location.href = 'perfil.html';
  });
  
  // Decoración extra: título animado sutil
  const style = document.createElement('style');
  style.textContent = `
    .podium-card { transition: all 0.2s ease; }
    .podium-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    .ranking-table td, .ranking-table th { transition: background 0.1s; }
  `;
  document.head.appendChild(style);
  
  // Si se desea añadir efectos visuales estelares al podio
  console.log("Ranking estelar cargado, posición del usuario: #" + currentUser.rank);
  
  // También generar fondo adicional de nebulosa (opcional)
  function addNebulaGlow() {
    const nebulaDiv = document.createElement('div');
    nebulaDiv.style.position = 'absolute';
    nebulaDiv.style.bottom = '0';
    nebulaDiv.style.right = '0';
    nebulaDiv.style.width = '200px';
    nebulaDiv.style.height = '200px';
    nebulaDiv.style.background = 'radial-gradient(circle, rgba(100,80,255,0.1) 0%, rgba(0,0,0,0) 70%)';
    nebulaDiv.style.borderRadius = '50%';
    nebulaDiv.style.pointerEvents = 'none';
    nebulaDiv.style.zIndex = '1';
    document.querySelector('.app-shell').appendChild(nebulaDiv);
  }
  addNebulaGlow();
</script>
</body>
</html>
